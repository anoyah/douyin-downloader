services:

  # ── Python API 服务 ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["python", "server.py"]
    restart: unless-stopped
    volumes:
      - ./config.yml:/app/config.yml:ro   # Cookie 等配置，只读挂载
      - downloads:/app/Downloaded          # 下载文件持久化
    expose:
      - "8080"                             # 仅容器内网可达，不对外暴露
    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          python -c "
          import urllib.request, sys
          try:
            urllib.request.urlopen('http://localhost:8080/health', timeout=5)
            sys.exit(0)
          except Exception:
            sys.exit(1)
          "
      interval: 20s
      timeout: 8s
      retries: 3
      start_period: 15s

  # ── Next.js Web 服务 ────────────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"                        # 对外暴露，手机访问此端口
    environment:
      # Next.js rewrites 将 /api/* /proxy 转发到 api 容器
      API_BASE_URL: http://api:8080
    depends_on:
      api:
        condition: service_healthy

volumes:
  downloads:
